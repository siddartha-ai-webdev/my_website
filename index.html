<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flipkart UI Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header class="header">
    <div class="logo">Flipkart</div>
    <input type="text" placeholder="Search for Products, Brands and More">
    <div class="nav">
        <span>Login</span>
        <span>More</span>
        <span>Cart</span>
    </div>
</header>

<!-- Categories -->
<div class="categories">
    <div>For You</div>
    <div>Fashion</div>
    <div>Mobiles</div>
    <div>Electronics</div>
    <div>Home</div>
    <div>Appliances</div>
    <div>Furniture</div>
</div>

<!-- Banner -->
<section class="banner">
    <div class="banner-text">
        <h1>T5x 5G | 7200 mAh</h1>
        <h2>Sale is live</h2>
        <p>Segment’s biggest battery</p>
    </div>
    <img src="https://via.placeholder.com/400x250" alt="phone">
</section>

</body>
</html>
